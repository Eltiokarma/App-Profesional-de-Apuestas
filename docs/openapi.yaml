openapi: 3.0.3
info:
  title: SAD API
  version: 0.1.0
  description: >
    Contrato entre el backend SAD (FastAPI + PostgreSQL, monolito modular con el
    paquete motor_sad) y los clientes (web SAD, UI PyQt). Espeja el pipeline
    sad → levels → constants → discreto documentado en MOTOR_SAD_EXTRACCION.md.
    El frontend web consume estos endpoints vía src/api/ cuando
    VITE_DATA_SOURCE=http.
servers:
  - url: http://localhost:8000/api/v1
    description: desarrollo local
  - url: https://api.CAMBIAR-DOMINIO.com/api/v1
    description: producción
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Estado del servicio, la DB y el último ciclo del pipeline
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }
  /fixtures:
    get:
      summary: Lista de fixtures (filtrable por fecha, estado, liga, temporada, equipo y rival H2H)
      parameters:
        - { name: fecha, in: query, schema: { type: string, format: date } }
        - { name: desde, in: query, schema: { type: string, format: date, description: 'solo fixtures con fecha >= desde' } }
        - { name: estado, in: query, schema: { $ref: '#/components/schemas/EstadoFixture' } }
        - { name: orden, in: query, schema: { type: string, enum: [asc, desc], default: desc, description: 'orden por fecha' } }
        - { name: ligaId, in: query, schema: { type: integer } }
        - { name: temporada, in: query, schema: { type: integer, description: 'solo fixtures de esta temporada de la liga' } }
        - { name: equipoId, in: query, schema: { type: integer, description: 'solo partidos de este equipo' } }
        - { name: rivalId, in: query, schema: { type: integer, description: 'con equipoId: solo enfrentamientos directos entre ambos (H2H); requiere equipoId' } }
        - { name: limit, in: query, schema: { type: integer, default: 50, minimum: 1, maximum: 500, description: 'tope 500: un día con amistosos globales supera los 200 partidos' } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Fixture' } }
  /fixtures/{id}:
    get:
      summary: Un fixture por id
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Fixture' }
        '404': { description: No existe }
  /fixtures/{id}/live:
    get:
      summary: Estado en vivo real del fixture (marcador, minuto, cuotas en juego)
      description: >
        Alimentado por la ingesta en vivo (SAD_LIVE_SEGUNDOS). `cuotas` es la
        última captura de odds en juego y `serie` el movimiento acumulado del
        partido (solo selecciones no suspendidas). Ambas vacías si la liga no
        tiene cobertura de odds live o la ingesta en vivo está apagada; el
        marcador/minuto salen de la tabla fixtures, refrescada por el mismo ciclo.
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FixtureLive' }
        '404': { description: No existe }
  /niveles/{equipoId}:
    get:
      summary: Historia de niveles del equipo (desc por fecha)
      parameters:
        - { name: equipoId, in: path, required: true, schema: { type: integer } }
        - { name: limit, in: query, schema: { type: integer, default: 50, minimum: 1, maximum: 500 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Nivel' } }
  /constantes/{equipoId}:
    get:
      summary: Historia de constantes K del equipo (desc por fecha)
      parameters:
        - { name: equipoId, in: path, required: true, schema: { type: integer } }
        - { name: limit, in: query, schema: { type: integer, default: 50, minimum: 1, maximum: 500 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Constantes' } }
  /constantes-cuota/{equipoId}:
    get:
      summary: 'k_cuota (§3.8): rachas de suma de cuota 1X2 prepartido, solo 2026 (asc por fecha)'
      description: Vacío si aún no se construyó constants_cuota (correr backend/backfill_cuota).
      parameters:
        - { name: equipoId, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/ConstanteCuota' } }
  /predicciones/{fixtureId}:
    get:
      summary: Ley de la Regresión al Nivel (gap) para un fixture
      parameters:
        - { name: fixtureId, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Prediccion' }
  /analisis-prepartido/{fixtureId}:
    get:
      summary: Reporte integral pre-partido (niveles + K + gap + resumen)
      parameters:
        - { name: fixtureId, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AnalisisPrepartido' }
  /equipos:
    get:
      summary: Búsqueda inteligente de equipos (sin tildes, ranking por prefijo)
      parameters:
        - { name: buscar, in: query, required: true, schema: { type: string, minLength: 2, maxLength: 60 } }
        - { name: limit, in: query, schema: { type: integer, default: 10, maximum: 25 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Equipo' } }
  /equipos/{equipoId}/stats:
    get:
      summary: Stats de temporada calculadas de los fixtures terminados
      parameters:
        - { name: equipoId, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EquipoStats' }
        '404': { description: No existe }
  /ligas/{ligaId}:
    get:
      summary: Metadatos de una liga (nombre, país, logo, bandera)
      parameters:
        - { name: ligaId, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Liga' }
        '404': { description: No existe }
  /ligas/{ligaId}/standings:
    get:
      summary: Tabla de posiciones calculada de los fixtures terminados
      parameters:
        - { name: ligaId, in: path, required: true, schema: { type: integer } }
        - { name: temporada, in: query, schema: { type: integer, description: 'default: última temporada' } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/StandingRow' } }
  /cuotas/{fixtureId}:
    get:
      summary: Cuotas del fixture por mercado y selección
      parameters:
        - { name: fixtureId, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Cuota' } }
  /cuotas/{fixtureId}/casas:
    get:
      summary: Cuotas por casa de apuestas (última foto) para comparar dónde paga más
      description: >
        Una fila por casa y selección, orden mercado → selección → cuota desc.
        `mejor: true` marca la cuota más alta de cada selección (varias si empatan):
        la diferencia de decimales entre casas es la ventaja al elegir dónde apostar.
      parameters:
        - { name: fixtureId, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/CuotaCasa' } }
  /cuotas/{fixtureId}/historial/fuentes:
    get:
      summary: Casas de referencia con historial propio para el fixture
      description: Nombres de casas (SAD_CASAS_REFERENCIA) con snapshots individuales, además de la media.
      parameters:
        - { name: fixtureId, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: array, items: { type: string } }
  /cuotas/{fixtureId}/historial:
    get:
      summary: Historial de cuotas prepartido (snapshots de cada corrida de ingesta, asc por captura)
      description: >
        Cada corrida de la ingesta guarda en odds_history la media entre casas por
        mercado/selección, y el crudo de las casas de referencia. Sin `casa` se
        sirve la media; con `casa` el movimiento de esa casa. Vacío si el fixture
        aún no tiene snapshots.
      parameters:
        - { name: fixtureId, in: path, required: true, schema: { type: integer } }
        - { name: casa, in: query, schema: { type: string, description: 'nombre de la casa de referencia (default: media)' } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/CuotaSnapshot' } }
  /analisis/efe:
    post:
      summary: Lanza el análisis EFE de un fixture (respuesta inmediata, trabajo en el servidor)
      description: >
        Capa EFE+DTP (docs/efe-dtp/PLAN_ADAPTADO.md). El análisis tarda 1-3 min:
        el POST responde al instante — 'listo' con el registro si ya existe (0
        créditos), o 'generando' tras lanzar el trabajo en un hilo del backend
        (sobrevive aunque el cliente cierre). El frontend sondea
        /analisis/efe/estado/{fixtureId}. Escribe SOLO en efe.db (excepción
        documentada a la regla de solo lectura). 404 si el fixture no existe;
        503 sin ANTHROPIC_API_KEY.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fixtureId]
              properties:
                fixtureId: { type: integer }
                forzar:
                  type: boolean
                  default: false
                  description: Regenerar — descarta el análisis guardado y emite uno nuevo (consume créditos)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GeneracionEfe' }
  /analisis/efe/estado/{fixtureId}:
    get:
      summary: Sondeo del trabajo de análisis EFE
      parameters:
        - { name: fixtureId, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: listo (con registro) / generando / error (con detalle) / nada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GeneracionEfe' }
  /analisis/timeline:
    post:
      summary: Lanza el timeline comparativo del fixture (modo futbol-timeline)
      description: >
        Cronología de los dos equipos del fixture (últimos 6 meses por defecto)
        emitida por el modelo como JSON del esquema TIMELINE y renderizada por
        <TimelineComparativo>. Mismo patrón asíncrono y de regeneración que
        /analisis/efe; hereda alertas y colores del EFE previo si existe. El
        registro devuelto lleva tipo 'timeline' y su resultado es el TIMELINE.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fixtureId]
              properties:
                fixtureId: { type: integer }
                forzar:
                  type: boolean
                  default: false
                  description: Regenerar — descarta el timeline guardado y emite uno nuevo
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GeneracionEfe' }
  /analisis/timeline/estado/{fixtureId}:
    get:
      summary: Sondeo del trabajo de timeline
      parameters:
        - { name: fixtureId, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: listo (con registro) / generando / error (con detalle) / nada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GeneracionEfe' }
  /analisis/partido/{fixtureId}:
    get:
      summary: Análisis emitidos para un fixture (lectura pura, cero créditos)
      parameters:
        - { name: fixtureId, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: OK ([] si no hay análisis)
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/AnalisisRegistro' } }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer }
  schemas:
    Health:
      type: object
      required: [status, version, dbOk, lastPipelineRun]
      properties:
        status: { type: string, enum: [ok, degraded] }
        version: { type: string }
        dbOk: { type: boolean }
        lastPipelineRun: { type: string, format: date-time, nullable: true }
    EstadoFixture:
      type: string
      enum: [programado, en_vivo, finalizado]
    Equipo:
      type: object
      required: [id, nombre, abreviatura]
      properties:
        id: { type: integer }
        nombre: { type: string }
        abreviatura: { type: string }
        pais: { type: string }
        logo: { type: string, nullable: true, description: 'URL del escudo (teams.logo de sad.db)' }
    Fixture:
      type: object
      required: [id, fecha, ligaId, liga, temporada, estado, local, visitante]
      properties:
        id: { type: integer }
        fecha: { type: string, format: date-time }
        ligaId: { type: integer }
        liga: { type: string }
        temporada: { type: integer }
        estado: { $ref: '#/components/schemas/EstadoFixture' }
        minuto: { type: integer, nullable: true }
        estadio: { type: string }
        local: { $ref: '#/components/schemas/Equipo' }
        visitante: { $ref: '#/components/schemas/Equipo' }
        golesLocal: { type: integer, nullable: true }
        golesVisitante: { type: integer, nullable: true }
        ligaLogo: { type: string, nullable: true, description: 'URL del logo del torneo (leagues.logo)' }
        ligaBandera: { type: string, nullable: true, description: 'URL de la bandera del país (leagues.flag; null en copas internacionales)' }
        ligaPais: { type: string, nullable: true, description: 'país del torneo (leagues.country): desambigua torneos homónimos, p. ej. la Copa de la Liga de Perú y la de Chile' }
    Liga:
      type: object
      required: [id, nombre]
      properties:
        id: { type: integer }
        nombre: { type: string }
        pais: { type: string, nullable: true }
        logo: { type: string, nullable: true }
        bandera: { type: string, nullable: true }
        temporada: { type: integer, nullable: true, description: 'última temporada conocida' }
        temporadas: { type: array, items: { type: integer }, description: 'temporadas con fixtures capturados, descendente' }
    Nivel:
      type: object
      required: [equipoId, fixtureId, fecha, nivel, bin, binEtiqueta]
      properties:
        equipoId: { type: integer }
        fixtureId: { type: integer }
        fecha: { type: string, format: date-time }
        nivel: { type: number, description: 'continuo ~0.5–3.5' }
        bin: { type: integer, minimum: 0, maximum: 9 }
        binEtiqueta: { type: string }
    Constantes:
      type: object
      description: Fila de constants + processed_matches (rival, goles) + fusión
      required: [equipoId, fixtureId, fecha, condicion, rivalId, rivalNombre, nivelRival, golesFavor, golesContra, ligaId, esInternacional, q, k, fusion]
      properties:
        equipoId: { type: integer }
        fixtureId: { type: integer }
        fecha: { type: string, format: date-time }
        condicion: { type: string, enum: [Local, Visita] }
        rivalId: { type: integer }
        rivalNombre: { type: string }
        nivelRival: { type: number }
        golesFavor: { type: integer }
        golesContra: { type: integer }
        ligaId: { type: integer }
        esInternacional: { type: boolean, description: 'true si fue torneo internacional (UCL, UEL, Libertadores…)' }
        q:
          type: object
          properties:
            local: { type: number, nullable: true }
            visita: { type: number, nullable: true }
            negativo: { type: number }
            golesAnotado: { type: number }
            golesRecibido: { type: number }
            dc: { type: number, description: 'Aporte Doble Oportunidad (§3.6): 0 si perdió, si no max(dif·nivelRival, 0.5·nivelRival)' }
        k:
          type: object
          description: Acumuladores de racha (§3.3) + Doble Oportunidad (§3.6) + Márgenes (§3.7)
          properties:
            positivo: { type: number }
            negativo: { type: number }
            positivoLocal: { type: number }
            negativoLocal: { type: number }
            positivoVisita: { type: number }
            negativoVisita: { type: number }
            golesAnotado: { type: number }
            golesRecibido: { type: number }
            golesLocalAnotado: { type: number }
            golesLocalRecibido: { type: number }
            golesVisitaAnotado: { type: number }
            golesVisitaRecibido: { type: number }
            dc: { type: number, description: 'Racha "sin perder" (1X); no-negativo, resetea solo al perder (§3.6)' }
            dcLocal: { type: number }
            dcVisita: { type: number }
            # Márgenes (§3.7): racha por margen exacto de goles (1/2/3+). Aporte plano nivelRival.
            vic1: { type: number }
            vic1Local: { type: number }
            vic1Visita: { type: number }
            vic2: { type: number }
            vic2Local: { type: number }
            vic2Visita: { type: number }
            vic3: { type: number }
            vic3Local: { type: number }
            vic3Visita: { type: number }
            der1: { type: number }
            der1Local: { type: number }
            der1Visita: { type: number }
            der2: { type: number }
            der2Local: { type: number }
            der2Visita: { type: number }
            der3: { type: number }
            der3Local: { type: number }
            der3Visita: { type: number }
        fusion:
          type: object
          description: K fusionadas k = k⁺ + k⁻ (§4.2); k_dc pasa tal cual (§3.6)
          properties:
            k: { type: number }
            kLocal: { type: number }
            kVisita: { type: number }
            golesAnotado: { type: number }
            golesRecibido: { type: number }
            golesLocalAnotado: { type: number }
            golesLocalRecibido: { type: number }
            golesVisitaAnotado: { type: number }
            golesVisitaRecibido: { type: number }
            kDc: { type: number }
            kDcLocal: { type: number }
            kDcVisita: { type: number }
            # Márgenes (§3.7): acumuladores no-negativos, pasan tal cual
            kVic1: { type: number }
            kVic1Local: { type: number }
            kVic1Visita: { type: number }
            kVic2: { type: number }
            kVic2Local: { type: number }
            kVic2Visita: { type: number }
            kVic3: { type: number }
            kVic3Local: { type: number }
            kVic3Visita: { type: number }
            kDer1: { type: number }
            kDer1Local: { type: number }
            kDer1Visita: { type: number }
            kDer2: { type: number }
            kDer2Local: { type: number }
            kDer2Visita: { type: number }
            kDer3: { type: number }
            kDer3Local: { type: number }
            kDer3Visita: { type: number }
    ConstanteCuota:
      type: object
      description: 'Fila de constants_cuota (§3.8): racha de SUMA de cuota 1X2, solo 2026'
      required: [equipoId, fixtureId, fecha, resultado, cuota, k]
      properties:
        equipoId: { type: integer }
        fixtureId: { type: integer }
        fecha: { type: string, format: date-time }
        resultado: { type: integer, enum: [1, 0, -1], description: '1 gana · 0 empata · -1 pierde' }
        esLocal: { type: boolean, description: 'true si jugó de local (toggle LOCAL/VISITA)' }
        cuota:
          type: object
          description: Cuota 1X2 que aplicó a ese partido (null si sin cuota capturada)
          properties:
            victoria: { type: number, nullable: true }
            empate: { type: number, nullable: true }
            derrota: { type: number, nullable: true }
        k:
          type: object
          description: 9 acumuladores de suma de cuota (total/local/visita)
          properties:
            victoria: { type: number }
            victoriaLocal: { type: number }
            victoriaVisita: { type: number }
            empate: { type: number }
            empateLocal: { type: number }
            empateVisita: { type: number }
            derrota: { type: number }
            derrotaLocal: { type: number }
            derrotaVisita: { type: number }
    GapEquipo:
      type: object
      required: [equipoId, nivel, ptsEsperados]
      properties:
        equipoId: { type: integer }
        nivel: { type: number }
        ptsRecientes: { type: number, nullable: true }
        ptsEsperados: { type: number, description: 'μ recortado a [0,3]' }
        gap: { type: number, nullable: true, description: 'esperados − recientes; >0 subrinde' }
        senal: { type: string, enum: [fuerte, leve, equilibrio], nullable: true }
        tendencia: { type: string, enum: [mejora, empeora], nullable: true }
        ptsEsperadosAjustados: { type: number, nullable: true, description: 'media de μ(nivel, rival_i, localía_i) sobre los MISMOS últ. 5 (ajuste por calendario); null si no hay 5' }
        gapAjustado: { type: number, nullable: true, description: 'esperadosAjustados − recientes; >0 subrinde DADO su calendario' }
        senalAjustada: { type: string, enum: [fuerte, leve, equilibrio], nullable: true }
        tendenciaAjustada: { type: string, enum: [mejora, empeora], nullable: true }
    Prediccion:
      type: object
      required: [fixtureId, local, visitante, generadoEn]
      properties:
        fixtureId: { type: integer }
        local: { $ref: '#/components/schemas/GapEquipo' }
        visitante: { $ref: '#/components/schemas/GapEquipo' }
        gapDiff: { type: number, nullable: true }
        gapDiffAjustado: { type: number, nullable: true, description: 'gapAjustado_local − gapAjustado_visitante' }
        generadoEn: { type: string, format: date-time }
    AnalisisPrepartido:
      type: object
      required: [fixtureId, niveles, constantes, prediccion, resumen]
      properties:
        fixtureId: { type: integer }
        niveles:
          type: object
          properties:
            local: { $ref: '#/components/schemas/Nivel' }
            visitante: { $ref: '#/components/schemas/Nivel' }
        constantes:
          type: object
          properties:
            local: { $ref: '#/components/schemas/Constantes', nullable: true }
            visitante: { $ref: '#/components/schemas/Constantes', nullable: true }
        prediccion: { $ref: '#/components/schemas/Prediccion' }
        resumen: { type: string }
    EquipoStats:
      type: object
      description: Calculadas de fixtures; los promedios avanzados son null hasta que el backend los derive
      required: [equipoId, nombre, partidosJugados, puntos, forma, golesFavorProm, golesContraProm]
      properties:
        equipoId: { type: integer }
        nombre: { type: string }
        partidosJugados: { type: integer }
        puntos: { type: integer }
        forma:
          type: array
          description: Últimos 5 resultados, más reciente primero
          items: { type: string, enum: [W, D, L] }
        golesFavorProm: { type: number }
        golesContraProm: { type: number }
        xgProm: { type: number, nullable: true }
        posesionProm: { type: number, nullable: true }
        tirosPuertaProm: { type: number, nullable: true }
        cornersProm: { type: number, nullable: true }
    StandingRow:
      type: object
      required: [posicion, equipoId, nombre, puntos, partidosJugados, golesFavor, golesContra]
      properties:
        posicion: { type: integer }
        equipoId: { type: integer }
        nombre: { type: string }
        puntos: { type: integer }
        partidosJugados: { type: integer }
        golesFavor: { type: integer }
        golesContra: { type: integer }
    Cuota:
      type: object
      required: [fixtureId, mercado, seleccion, cuota, actualizadoEn]
      properties:
        fixtureId: { type: integer }
        mercado: { type: string, enum: [1x2, dc, ou, ah, btts] }
        seleccion: { type: string }
        cuota: { type: number }
        actualizadoEn: { type: string, format: date-time }
    EventoLive:
      type: object
      description: Evento del partido para anclar el movimiento de la gráfica (gol, tarjeta)
      required: [minuto, tipo]
      properties:
        minuto: { type: integer, nullable: true }
        tipo: { type: string, enum: [gol, amarilla, roja] }
        equipoId: { type: integer, nullable: true }
        jugador: { type: string, nullable: true }
        detalle: { type: string, nullable: true, description: 'detalle crudo de la API (Penalty, Own Goal…)' }
    GeneracionEfe:
      type: object
      required: [estado]
      properties:
        estado: { type: string, enum: [listo, generando, error, nada] }
        detalle: { type: string, nullable: true, description: 'mensaje del error o del progreso' }
        registro: { $ref: '#/components/schemas/AnalisisRegistro', nullable: true, description: 'presente solo con estado=listo' }
    AnalisisRegistro:
      type: object
      required: [tipo, fixtureId, estado, versionEfe, creadoEn, resultado]
      properties:
        tipo: { type: string, enum: [efe, dtp, matriz] }
        fixtureId: { type: integer }
        estado: { type: string, enum: [preliminar, confirmado], description: 'preliminar = XI provisional (T−24h); confirmado = XI oficial (T−40min)' }
        versionEfe: { type: string, description: 'versión del protocolo con la que se emitió (inmutable)' }
        creadoEn: { type: string, format: date-time }
        resultado: { type: object, description: 'JSON del esquema EFE_COMPARATIVO / DTP / MATRIZ_V2 (backend/analisis/esquemas.py)', additionalProperties: true }
    FixtureLive:
      type: object
      required: [fixtureId, estado, minuto, golesLocal, golesVisitante, cuotas, serie, eventos, actualizadoEn]
      properties:
        fixtureId: { type: integer }
        estado: { $ref: '#/components/schemas/EstadoFixture' }
        minuto: { type: integer, nullable: true }
        golesLocal: { type: integer, nullable: true }
        golesVisitante: { type: integer, nullable: true }
        cuotas:
          type: array
          description: Última captura de cuotas en juego (mercados mapeables del contrato)
          items: { $ref: '#/components/schemas/CuotaLive' }
        serie:
          type: array
          description: Movimiento acumulado del partido, asc por captura (sin suspendidas)
          items: { $ref: '#/components/schemas/PuntoLive' }
        eventos:
          type: array
          description: Goles y tarjetas del partido, asc por minuto (de la ingesta en vivo/cierre)
          items: { $ref: '#/components/schemas/EventoLive' }
        actualizadoEn: { type: string, format: date-time, nullable: true, description: 'última captura live; null si nunca hubo' }
    CuotaLive:
      type: object
      required: [mercado, seleccion, cuota, suspendida]
      properties:
        mercado: { type: string, enum: [1x2, dc, ou, ah, btts] }
        seleccion: { type: string }
        cuota: { type: number }
        suspendida: { type: boolean, description: 'la casa no acepta apuestas a esta selección ahora' }
    PuntoLive:
      type: object
      required: [minuto, mercado, seleccion, cuota]
      properties:
        minuto: { type: integer, nullable: true }
        mercado: { type: string, enum: [1x2, dc, ou, ah, btts] }
        seleccion: { type: string }
        cuota: { type: number }
    CuotaCasa:
      type: object
      description: Cuota de UNA casa para una selección (última foto de la ingesta)
      required: [fixtureId, mercado, seleccion, casaId, casa, cuota, mejor]
      properties:
        fixtureId: { type: integer }
        mercado: { type: string, enum: [1x2, dc, ou, ah, btts] }
        seleccion: { type: string }
        casaId: { type: integer }
        casa: { type: string }
        cuota: { type: number }
        mejor: { type: boolean, description: 'true si es la cuota más alta de la selección' }
    CuotaSnapshot:
      type: object
      description: Un punto del movimiento prepartido (media entre casas en esa captura)
      required: [fixtureId, mercado, seleccion, cuota, capturadoEn]
      properties:
        fixtureId: { type: integer }
        mercado: { type: string, enum: [1x2, dc, ou, ah, btts] }
        seleccion: { type: string }
        cuota: { type: number }
        casas: { type: integer, description: 'nº de bookmakers promediados en la captura' }
        capturadoEn: { type: string, format: date-time }
