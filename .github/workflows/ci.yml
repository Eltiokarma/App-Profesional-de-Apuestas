name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Instalar dependencias
        run: npm ci
      - name: Verificar Motor SAD contra el doc de extracción
        run: npm run test:motor
      - name: Typecheck + build de producción
        run: npm run build
