name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Instalar dependencias
        run: npm ci
      - name: Verificar Motor SAD contra el doc de extracción
        run: npm run test:motor
      - name: Typecheck + build de producción
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Instalar dependencias del backend
        run: pip install -r backend/requirements.txt
      - name: Tests del contrato SAD API (seed demo + verificaciones)
        run: python -m backend.test_api
      - name: Tests del acumulador k_cuota
        run: python -m backend.test_cuota
